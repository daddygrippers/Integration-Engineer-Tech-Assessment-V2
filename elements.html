<script>
  window.dataLayer = window.dataLayer || [];

  window.dataLayer.push({
    event: "product_view",
    productName: document.getElementById("product-name").innerText,
    productPrice: document.getElementById("product-price").innerText
  });

  document.getElementById("purchase-btn").addEventListener("click", async () => {

    const payload = {
      productName: document.getElementById("product-name").innerText,
      productPrice: document.getElementById("product-price").innerText
    };

    const res = await fetch("https://httpbin.org/post", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    console.log(data);

    alert("Purchase simulated!");
  });
</script>
